name: ci-lint

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --only-group dev

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # .pre-commit-config.yaml is the single source of truth for lint tool
      # versions (ruff, codespell). `uv sync --locked` above already guards
      # lockfile drift, so the generative uv hooks are skipped here.
      - name: Run pre-commit
        env:
          SKIP: uv-lock,uv-export
        run: uv run --no-sync pre-commit run --all-files --show-diff-on-failure
